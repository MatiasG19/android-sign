name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # - name: Setup Java
      #   uses: actions/setup-java@v4
      #   with:
      #     distribution: 'temurin'
      #     java-version: '17'
      #     cache: 'gradle'

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "YARN_CACHE_DIR_PATH=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - name: Cache yarn dependencies
        uses: actions/cache@v4
        id: yarn-cache
        with:
          path: |
            ${{ steps.yarn-cache-dir-path.outputs.YARN_CACHE_DIR_PATH }}
            **/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install app dependecies
        run: yarn --frozen-lockfile

      - name: Test signing apk
        run: |
          export RELEASEDIRECTORY=${{ github.workspace }}/__tests__/assets/apk/*.apk
          export SIGNINGKEYBASE64=${{ secrets.TEST_KEY }}
          export OUTPUT=${{ github.workspace }}/dist
          export KEYSTOREPASSWORD=${{ secrets.TEST_KEY_STORE_PASSWORD_123456 }}
          export KEYPASSWORD=${{ secrets.TEST_KEY_PASSWORD_123456 }}
          export BUILD_TOOLS_VERSION=33.0.2
          node dist/index.js
